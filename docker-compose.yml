services:
  postgres:
    image: postgres:16
    container_name: postgres_catastrophe
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: catastrophe_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "password_encryption=md5", "-c", "listen_addresses=*"]

volumes:
  postgres_data:
